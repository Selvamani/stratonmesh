global:
  scrape_interval: 15s
  scrape_timeout: 10s

scrape_configs:

  - job_name: sm-agent-local
    static_configs:
      - targets:
          - sm-agent:9091
        labels:
          node_name: local-host

  - job_name: sm-agent-node2
    static_configs:
      - targets:
          - sm-agent-node2:9091
        labels:
          node_name: node-2

  - job_name: sm-agent-node3
    static_configs:
      - targets:
          - sm-agent-node3:9091
        labels:
          node_name: node-3

  - job_name: sm-controller
    static_configs:
      - targets:
          - sm-controller:8080
    metrics_path: /metrics

  - job_name: nats
    static_configs:
      - targets:
          - nats:8222
    metrics_path: /metrics

  - job_name: victoriametrics
    static_configs:
      - targets:
          - victoriametrics:8428
    metrics_path: /metrics
