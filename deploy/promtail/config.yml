server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    external_labels:
      host: stratonmesh-dev

scrape_configs:
  - job_name: stratonmesh
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 10s
        filters:
          - name: status
            values: ["running"]

    relabel_configs:
      # Only ship containers from the stratonmesh compose project (name: stratonmesh in compose file)
      - source_labels: [__meta_docker_container_label_com_docker_compose_project]
        regex: stratonmesh
        action: keep

      # Compose service name  e.g. sm-controller, sm-agent, grafana
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: compose_service

      # Container name with leading slash stripped
      - source_labels: [__meta_docker_container_name]
        regex: /(.*)
        target_label: container

      # stdout or stderr
      - source_labels: [__meta_docker_container_log_stream]
        target_label: stream
